<h5 class="mb-1">{{ station.name }}</h5>
<p class="text-body-secondary mb-3">
    <span class="badge bg-secondary">{{ station.brand or '?' }}</span>
    {{ station.street }} {{ station.get('house_number', '') }}, {{ station.place }}
</p>

{% if events %}
<canvas id="priceChart" height="250"
        data-events='{{ events | tojson }}'></canvas>
{% else %}
<div class="text-center text-body-secondary py-4">
    <i class="bi bi-graph-up fs-3 d-block mb-2"></i>
    Noch keine Preisdaten für diese Tankstelle.
</div>
{% endif %}
