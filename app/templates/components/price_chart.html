<h5 class="mb-1">{{ station.name }}</h5>
<p class="text-body-secondary mb-3">
    <span class="badge bg-secondary">{{ station.brand or '?' }}</span>
    {{ station.street }} {{ station.get('house_number', '') }}, {{ station.place }}
</p>

{% if events %}
<canvas id="priceChart" height="250"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
(function() {
    const ctx = document.getElementById('priceChart').getContext('2d');
    const events = {{ events | tojson }};

    const labels = events.map(e => {
        const d = new Date(e.fetched_at);
        return d.toLocaleString('de-DE', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'});
    });

    const datasets = [];
    const colors = {diesel: '#198754', e5: '#0d6efd', e10: '#fd7e14'};
    const names = {diesel: 'Diesel', e5: 'Super E5', e10: 'Super E10'};

    for (const fuel of ['diesel', 'e5', 'e10']) {
        const data = events.map(e => e[fuel]);
        if (data.some(v => v !== null && v !== undefined)) {
            datasets.push({
                label: names[fuel],
                data: data,
                borderColor: colors[fuel],
                backgroundColor: colors[fuel] + '20',
                tension: 0.3,
                pointRadius: 2,
                fill: true,
            });
        }
    }

    new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
            responsive: true,
            interaction: { intersect: false, mode: 'index' },
            scales: {
                y: {
                    ticks: { callback: v => v.toFixed(3) + ' €' }
                }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        label: item => item.dataset.label + ': ' + item.raw.toFixed(3) + ' €'
                    }
                }
            }
        }
    });
})();
</script>
{% else %}
<div class="text-center text-body-secondary py-4">
    <i class="bi bi-graph-up fs-3 d-block mb-2"></i>
    Noch keine Preisdaten für diese Tankstelle.
</div>
{% endif %}
